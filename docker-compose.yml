services:

  mysql:
    image: mysql:8.4
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_biblioteca
      MYSQL_USER: dev
      MYSQL_PASSWORD: minhasenha
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d

  php:
    build: .
    container_name: php
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"

  composer:
    image: composer
    container_name: composer
    working_dir: /app
    volumes:
      - ./:/app

volumes:
  mysql_data: